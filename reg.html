<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>FFA1 – stedsregistrering</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body{height:100%;margin:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;}
  #map{position:fixed;inset:0;}
  #verktøy{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:1000;background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:10px;max-height:42vh;overflow:auto;}
  #verktøy h2{font-size:15px;margin:2px 4px 8px;}
  .knapp{border:none;border-radius:12px;padding:12px;font-size:15px;font-weight:800;cursor:pointer;width:100%;margin-bottom:8px;box-sizing:border-box;}
  .grønn{background:#0e7c5b;color:#fff;}
  .grå{background:#e8e5dc;color:#222;}
  .rad{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #eee;font-size:14px;}
  .rad:last-child{border-bottom:none;}
  .rad .n{flex:1;font-weight:700;}
  .rad .k{color:#888;font-size:11px;}
  .rad button{border:none;background:#eee;border-radius:8px;padding:4px 9px;font-weight:700;cursor:pointer;color:#666;}
  #status{font-size:12px;color:#666;margin:0 4px 8px;}
  #flyttBanner{display:none;position:fixed;top:calc(12px + env(safe-area-inset-top));left:10px;right:10px;z-index:1100;background:#0e7c5b;color:#fff;border-radius:14px;padding:12px;box-shadow:0 4px 16px rgba(0,0,0,.3);align-items:center;gap:10px;font-size:14px;font-weight:700;}
  #flyttBanner button{border:none;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;}
  #eksOverlay{display:none;position:fixed;inset:0;z-index:1200;background:#fff;flex-direction:column;padding:calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));box-sizing:border-box;}
  #eksOverlay h2{margin:0 0 8px;font-size:17px;}
  #eksTekst{flex:1;width:100%;font-size:12px;border:1px solid #ccc;border-radius:10px;box-sizing:border-box;padding:8px;-webkit-user-select:text;user-select:text;}
  .popKnapp{border:none;border-radius:8px;padding:7px 10px;font-weight:700;cursor:pointer;background:#e8e5dc;margin:2px;font-size:13px;}
</style>
</head>
<body>
<div id="map"></div>
<div id="flyttBanner"><span style="flex:1;">✥ Dra pilen dit den skal</span><button style="background:#fff;color:#0e7c5b;" onclick="lagreFlytt()">Lagre</button><button style="background:#ffffff33;color:#fff;" onclick="avbrytFlytt()">Avbryt</button></div>
<div id="verktøy">
  <h2>📍 FFA1 – registrer steder</h2>
  <div id="status">Venter på GPS…</div>
  <button class="knapp grønn" onclick="markerHer()">➕ Marker her (min GPS-posisjon)</button>
  <div style="font-size:12px;color:#666;margin:-4px 4px 8px;">Hold fingeren på kartet = nytt punkt der. Trykk på en pil = meny (flytt/endre/slett). Hold på en pil = flytt den.</div>
  <div id="liste"></div>
  <button class="knapp grå" onclick="visEksport()">📋 Eksporter / del stedene</button>
</div>
<div id="eksOverlay">
  <h2>📋 Stedene dine (JSON)</h2>
  <div style="font-size:13px;color:#666;margin-bottom:8px;">Send hele denne teksten til Claude – bruk Del-knappen (Meldinger/e-post) eller Kopier.</div>
  <textarea id="eksTekst" readonly></textarea>
  <button class="knapp grønn" style="margin-top:10px;" onclick="delEksport()">📤 Del…</button>
  <button class="knapp grå" id="kopiKnapp" onclick="kopier()">Kopier til utklippstavle</button>
  <button class="knapp grå" onclick="document.getElementById('eksOverlay').style.display='none'">Lukk</button>
</div>
<script>
const KART=L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png',{maxZoom:19,attribution:'© Kartverket'});
const FOTO=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'});
const OSM=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
const map=L.map('map',{center:[59.1249,10.3224],zoom:16,layers:[KART]});
L.control.layers({'Kart (Kartverket)':KART,'Flyfoto':FOTO,'OSM':OSM},null,{position:'topright'}).addTo(map);

let steder=[];try{steder=JSON.parse(localStorage.getItem('ffa1_reg_v1'))||[];}catch(e){}
const lag=L.layerGroup().addTo(map);
let markørListe=[],flytterIdx=null;
function lagre(){localStorage.setItem('ffa1_reg_v1',JSON.stringify(steder));}
function esc(s){return String(s).replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function tegn(){
  lag.clearLayers();markørListe=[];
  steder.forEach((s,i)=>{
    const mk=L.marker([s.lat,s.lng]).addTo(lag);
    mk.bindPopup('<b>'+esc(s.navn)+'</b><br><span style="font-size:11px;color:#888;">'+s.lat+', '+s.lng+'</span><br>'+
      '<button class="popKnapp" onclick="startFlytt('+i+')">✥ Flytt</button>'+
      '<button class="popKnapp" onclick="endreNavn('+i+')">✏️ Navn</button>'+
      '<button class="popKnapp" onclick="slett('+i+')">🗑 Slett</button>');
    mk.on('contextmenu',e=>{L.DomEvent.stopPropagation(e);startFlytt(i);});
    markørListe.push(mk);
  });
  document.getElementById('liste').innerHTML=steder.map((s,i)=>
    '<div class="rad" onclick="map.setView(['+s.lat+','+s.lng+'],18)"><span class="n">'+esc(s.navn)+'</span><span class="k">'+s.lat+', '+s.lng+'</span><button onclick="event.stopPropagation();slett('+i+')">✕</button></div>').join('')||'<div style="font-size:13px;color:#888;padding:4px;">Ingen steder registrert ennå.</div>';
}
function leggTil(lat,lng){
  if(flytterIdx!==null)return;
  const navn=prompt('Navn på stedet (f.eks. Utescenen):');
  if(!navn)return;
  steder.push({navn:navn.trim(),lat:+lat.toFixed(6),lng:+lng.toFixed(6)});
  lagre();tegn();
}
function slett(i){if(confirm('Slette «'+steder[i].navn+'»?')){map.closePopup();steder.splice(i,1);lagre();tegn();}}
function endreNavn(i){const n=prompt('Nytt navn:',steder[i].navn);if(n){steder[i].navn=n.trim();lagre();tegn();map.closePopup();}}
function startFlytt(i){
  map.closePopup();
  if(flytterIdx!==null)avbrytFlytt();
  flytterIdx=i;
  const mk=markørListe[i];
  mk.dragging.enable();mk.setOpacity(0.6);mk.setZIndexOffset(1000);
  document.getElementById('flyttBanner').style.display='flex';
}
function lagreFlytt(){
  if(flytterIdx===null)return;
  const p=markørListe[flytterIdx].getLatLng();
  steder[flytterIdx].lat=+p.lat.toFixed(6);steder[flytterIdx].lng=+p.lng.toFixed(6);
  lagre();avsluttFlytt();
}
function avbrytFlytt(){avsluttFlytt();}
function avsluttFlytt(){flytterIdx=null;document.getElementById('flyttBanner').style.display='none';tegn();}
map.on('contextmenu',e=>leggTil(e.latlng.lat,e.latlng.lng));

let minPos=null,meMark=null,meSirkel=null,første=true;
function markerHer(){
  if(!minPos){alert('Har ikke GPS-posisjon ennå – vent litt (og godta stedstilgang).');return;}
  leggTil(minPos.lat,minPos.lng);
}
if(navigator.geolocation){
  navigator.geolocation.watchPosition(p=>{
    minPos={lat:p.coords.latitude,lng:p.coords.longitude};
    document.getElementById('status').textContent='GPS: '+minPos.lat.toFixed(5)+', '+minPos.lng.toFixed(5)+' (±'+Math.round(p.coords.accuracy)+' m)';
    if(!meMark){
      meMark=L.circleMarker(minPos,{radius:8,color:'#fff',weight:2,fillColor:'#1a73e8',fillOpacity:1}).addTo(map);
      meSirkel=L.circle(minPos,{radius:p.coords.accuracy,color:'#1a73e8',weight:1,fillOpacity:.08}).addTo(map);
    }else{meMark.setLatLng(minPos);meSirkel.setLatLng(minPos);meSirkel.setRadius(p.coords.accuracy);}
    if(første){første=false;map.setView(minPos,17);}
  },e=>{document.getElementById('status').textContent='GPS-feil: '+e.message;},{enableHighAccuracy:true,maximumAge:2000});
}else{document.getElementById('status').textContent='Ingen GPS i denne nettleseren.';}

function visEksport(){
  document.getElementById('eksTekst').value=JSON.stringify(steder,null,1);
  document.getElementById('eksOverlay').style.display='flex';
}
function delEksport(){
  const t='FFA1-steder:\n'+JSON.stringify(steder,null,1);
  if(navigator.share){navigator.share({title:'FFA1 steder',text:t}).catch(()=>{});}
  else kopier();
}
function kopier(){
  const t=document.getElementById('eksTekst');
  t.focus();t.select();t.setSelectionRange(0,999999);
  const vis=ok=>{const k=document.getElementById('kopiKnapp');k.textContent=ok?'✅ Kopiert!':'Merk teksten og kopier manuelt';setTimeout(()=>k.textContent='Kopier til utklippstavle',2500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t.value).then(()=>vis(true)).catch(()=>{try{vis(document.execCommand('copy'));}catch(e){vis(false);}});}
  else{try{vis(document.execCommand('copy'));}catch(e){vis(false);}}
}
tegn();
</script>
</body>
</html>
